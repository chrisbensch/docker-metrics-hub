name: docker-metrics-hub

services:
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    container_name: docker-metrics-hub-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}
      - --web.enable-lifecycle
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - ./appdata/prometheus:/prometheus
    ports:
      - "${PROMETHEUS_BIND_ADDR:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana-oss:latest}
    container_name: docker-metrics-hub-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-this-password}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - ./appdata/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_BIND_ADDR:-0.0.0.0}:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  blackbox-exporter:
    image: ${BLACKBOX_EXPORTER_IMAGE:-prom/blackbox-exporter:latest}
    container_name: docker-metrics-hub-blackbox-exporter
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "${BLACKBOX_BIND_ADDR:-127.0.0.1}:${BLACKBOX_PORT:-9115}:9115"
    cap_add:
      - NET_RAW
    restart: unless-stopped
    networks:
      - monitoring

  pve-exporter:
    image: ${PVE_EXPORTER_IMAGE:-prompve/prometheus-pve-exporter:latest}
    container_name: docker-metrics-hub-pve-exporter
    command:
      - --config.file=/etc/prometheus/pve.yml
      - --web.listen-address=0.0.0.0:9221
      - --no-collector.config
    volumes:
      - ./proxmox:/etc/prometheus:ro
    ports:
      - "${PVE_EXPORTER_BIND_ADDR:-127.0.0.1}:${PVE_EXPORTER_PORT:-9221}:9221"
    restart: unless-stopped
    networks:
      - monitoring

  alertmanager:
    image: ${ALERTMANAGER_IMAGE:-prom/alertmanager:latest}
    container_name: docker-metrics-hub-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./appdata/alertmanager:/alertmanager
    ports:
      - "${ALERTMANAGER_BIND_ADDR:-127.0.0.1}:${ALERTMANAGER_PORT:-9093}:9093"
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
